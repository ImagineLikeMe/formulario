<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body bgcolor="Plum">
    <form align="center">
        <label style="color:DarkMagenta"><h2>Cadastro de Produto/Item</h2></label>
        <br><br>
        <label>Nome do Produto/Item:</label>
        <input type="text" required>
        <br><br>
        <label>Descrição de até 60 caracteres:</label>
        <textarea maxlength="60"></textarea>
        <br><br>
        <label>Unidade de Medida:</label>
        <input type="text" required>
        <br><br>
        <label>Quantidade (De 1 a 10):</label>
        <input type="number" min="1" max="10" required>
        <br><br>
        <label>Valor:</label>
        <input type="number" step="0.01" min="0" required>
        <br><br>
        <button type="submit" link="black" vlink="black" alink="black"><a href="siteprincipal.html">Cadastrar</a></button>
        <br><br><br>
        <label link="black" vlink="black" alink="black"><a href="siteprincipal.html">Voltar ao Site Principal</a></label>
    </form>
</body>
</html>
